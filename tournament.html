<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoardZone 🎲 — Tournament</title>
<meta name="description" content="View tournament details, check available spots, and book your place at BoardZone.">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-dark:        #0B0F19;
  --bg-darker:      #05080F;
  --card-bg:        rgba(20, 25, 35, 0.65);
  --card-border:    rgba(255, 255, 255, 0.08);
  --text-main:      #F3F4F6;
  --text-muted:     #9CA3AF;
  --accent-primary: #8B5CF6;
  --accent-secondary:#06B6D4;
  --accent-glow:    rgba(139, 92, 246, 0.5);
  --success:        #10B981;
  --danger:         #EF4444;
  --warning:        #F59E0B;
}

html, body { min-height: 100%; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-dark);
  color: var(--text-main);
  min-height: 100vh;
  padding-bottom: 180px;
  position: relative;
}

/* ── Global background ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse at 80% 0%,   rgba(139, 92, 246, 0.14) 0%, transparent 55%),
    radial-gradient(ellipse at 20% 100%, rgba(6, 182, 212, 0.09)  0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%,  rgba(139, 92, 246, 0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: -2;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: -1;
}

/* Floating blobs */
.blob { position: fixed; border-radius: 50%; filter: blur(110px); animation: drift 18s ease-in-out infinite alternate; z-index: 0; pointer-events: none; }
.b1 { width: 500px; height: 500px; background: rgba(139, 92, 246, 0.08); top: -120px; left: -80px; animation-delay: 0s; }
.b2 { width: 380px; height: 380px; background: rgba(6, 182, 212, 0.07); bottom: -120px; right: -80px; animation-delay: -7s; }
@keyframes drift {
  0%   { transform: translate(0, 0) scale(1); }
  50%  { transform: translate(30px, -30px) scale(1.08); }
  100% { transform: translate(-20px, 20px) scale(0.96); }
}

/* ── Page loader ── */
#page-loader {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100vh; gap: 20px;
}
.spinner {
  width: 46px; height: 46px;
  border: 3px solid rgba(139, 92, 246, 0.2);
  border-top-color: var(--accent-primary);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#page-loader p {
  color: var(--text-muted);
  font-family: 'Space Grotesk', sans-serif;
  font-size: .85rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  font-weight: 600;
}
#page-content { display: none; position: relative; z-index: 5; }

/* ── Cover ── */
.cover {
  position: relative;
  height: 52vh;
  min-height: 320px;
  overflow: hidden;
}
.cover img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  filter: brightness(0.55) saturate(1.1);
  transition: transform 10s ease;
}
.cover:hover img { transform: scale(1.04); }

/* Layered overlays */
.cover-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(11, 15, 25, 0.55)  0%,
    rgba(11, 15, 25, 0.05)  35%,
    rgba(11, 15, 25, 0.98)  100%
  );
}
.cover-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
}
/* Subtle purple vignette on sides */
.cover-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 80%, transparent 50%, rgba(11,15,25,.6) 100%);
  pointer-events: none;
}

/* Back button */
.back-btn {
  position: absolute;
  top: 22px; left: 22px; z-index: 20;
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(11, 15, 25, 0.75);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--card-border);
  border-radius: 100px;
  padding: 9px 20px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: .82rem; font-weight: 700;
  color: var(--text-main);
  text-decoration: none;
  transition: all .3s ease;
  letter-spacing: .04em;
}
.back-btn:hover {
  background: rgba(139, 92, 246, 0.2);
  border-color: rgba(139, 92, 246, 0.5);
  box-shadow: 0 0 20px rgba(139, 92, 246, 0.25);
  color: #fff;
}

/* Cover badge */
.cover-badge {
  position: absolute;
  top: 22px; right: 22px; z-index: 20;
  background: rgba(11, 15, 25, 0.8);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  color: var(--accent-secondary);
  padding: 8px 20px;
  border-radius: 100px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: .82rem; font-weight: 800;
  border: 1px solid rgba(6, 182, 212, 0.35);
  box-shadow: 0 0 22px rgba(6, 182, 212, 0.2), inset 0 1px 0 rgba(255,255,255,0.08);
  letter-spacing: .06em;
}

/* Cover title */
.cover-info {
  position: absolute;
  bottom: 32px; left: 28px; right: 28px; z-index: 10;
}
.cover-info h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 800;
  color: var(--text-main);
  line-height: 1.1;
  letter-spacing: -.02em;
}

/* Gradient accent line under title */
.cover-info::before {
  content: '';
  display: block;
  width: 50px; height: 3px;
  background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
  border-radius: 100px;
  margin-bottom: 12px;
  box-shadow: 0 0 12px rgba(139, 92, 246, 0.6);
}

/* ── Content area ── */
.content {
  max-width: 820px;
  margin: 0 auto;
  padding: 36px 24px 20px;
}

/* ── Pills ── */
.pills-row {
  display: flex; gap: 10px;
  flex-wrap: wrap; margin-bottom: 28px;
}
.pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 20px; border-radius: 100px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: .8rem; font-weight: 700; letter-spacing: .04em;
}
.pill-price {
  background: rgba(139, 92, 246, 0.12);
  color: var(--accent-primary);
  border: 1px solid rgba(139, 92, 246, 0.35);
  box-shadow: 0 0 16px rgba(139, 92, 246, 0.12);
}
.pill-spots {
  background: rgba(16, 185, 129, 0.1);
  color: var(--success);
  border: 1.5px solid rgba(16, 185, 129, 0.3);
}
.pill-spots.full { background: rgba(239,68,68,.1); color: var(--danger); border-color: rgba(239,68,68,.3); }
.pill-spots.low  { background: rgba(245,158,11,.1); color: var(--warning); border-color: rgba(245,158,11,.3); }

/* ── Glassmorphism blocks ── */
.block {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 30px;
  margin-bottom: 20px;
  border: 1px solid var(--card-border);
  box-shadow: 0 10px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
  position: relative;
  overflow: hidden;
}
/* Gradient shimmer on top edge */
.block::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(139,92,246,.35) 40%, rgba(6,182,212,.35) 60%, transparent 100%);
}

.block-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1rem; font-weight: 700;
  color: var(--text-main);
  margin-bottom: 22px;
  letter-spacing: .02em;
}

/* ── Player dots ── */
.dots-wrap {
  display: flex; gap: 10px;
  flex-wrap: wrap; align-items: center;
}
.dot {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
  transition: all .3s;
}
.dot.filled {
  background: linear-gradient(135deg, var(--accent-primary), #6D28D9);
  box-shadow: 0 0 22px rgba(139, 92, 246, 0.55), 0 4px 14px rgba(0,0,0,.35);
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1) backwards;
}
.dot.filled:hover {
  box-shadow: 0 0 32px rgba(139, 92, 246, 0.8), 0 4px 14px rgba(0,0,0,.35);
  transform: scale(1.1);
}
.dot.empty {
  background: rgba(255,255,255,.03);
  border: 2px dashed rgba(255,255,255,.12);
  color: rgba(255,255,255,.18);
  font-size: 1rem;
}
@keyframes popIn {
  from { transform: scale(0.3); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.dots-sub {
  margin-top: 18px;
  font-size: .87rem;
  color: var(--text-muted);
  font-weight: 500; line-height: 1.6;
}

/* ── Description ── */
.desc-ar {
  color: var(--text-muted);
  font-size: .96rem; line-height: 1.85;
  direction: rtl; text-align: right;
}
.explain-ar {
  color: var(--text-muted);
  font-size: .9rem; line-height: 1.9;
  direction: rtl; text-align: right;
  margin-top: 22px; padding-top: 22px;
  border-top: 1px solid var(--card-border);
  white-space: pre-line;
}

/* ── Sticky bar ── */
.sticky-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(5, 8, 15, 0.92);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-top: 1px solid var(--card-border);
  padding: 16px 32px;
  display: flex; align-items: center;
  justify-content: space-between; gap: 24px;
  box-shadow: 0 -10px 40px rgba(0,0,0,.55);
}
/* Glowing accent line at top of bar */
.sticky-bar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(139,92,246,.5) 30%, rgba(6,182,212,.5) 70%, transparent 100%);
}

.bar-price-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: .68rem; color: var(--text-muted);
  font-weight: 700; text-transform: uppercase;
  letter-spacing: .12em; margin-bottom: 5px;
}
.bar-price-amount {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.55rem; font-weight: 800;
  color: var(--text-main); letter-spacing: -.01em;
}

.btn-book {
  flex: 1; max-width: 250px;
  padding: 15px 28px;
  background: linear-gradient(135deg, var(--accent-primary), #6D28D9);
  color: #fff; border: none; border-radius: 14px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: .95rem; font-weight: 700;
  cursor: pointer; letter-spacing: .04em;
  transition: all .3s ease;
  box-shadow: 0 4px 22px rgba(139, 92, 246, 0.45);
  white-space: nowrap;
  position: relative; overflow: hidden;
}
.btn-book::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 55%);
  pointer-events: none;
}
.btn-book:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 34px rgba(139, 92, 246, 0.65);
  filter: brightness(1.1);
}
.btn-book:active:not(:disabled) { transform: translateY(0); }
.btn-book:disabled { background: rgba(255,255,255,.08); color: var(--text-muted); box-shadow: none; cursor: not-allowed; }
.btn-book:disabled::after { display: none; }
.btn-book.booked {
  background: linear-gradient(135deg, var(--success), #059669);
  box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
}

/* ── Modal ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(5, 8, 15, 0.82);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 200; display: none;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-bg.open { display: flex; }

.modal-card {
  background: rgba(15, 20, 30, 0.98);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--card-border);
  border-radius: 28px;
  padding: 42px 38px;
  width: 100%; max-width: 450px;
  box-shadow: 0 30px 90px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07);
  animation: slideUp .35s cubic-bezier(.34,1.56,.64,1);
  position: relative; overflow: hidden;
}
.modal-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(139,92,246,.6), rgba(6,182,212,.6), transparent);
}
.modal-card::after {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at 50% 0%, rgba(139,92,246,.06) 0%, transparent 60%);
}
@keyframes slideUp {
  from { transform: translateY(40px) scale(.97); opacity: 0; }
  to   { transform: translateY(0)    scale(1);   opacity: 1; }
}

.modal-icon {
  font-size: 3rem; text-align: center;
  margin-bottom: 12px;
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 0 12px rgba(139,92,246,.4));
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-8px); }
}
.modal-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.55rem; font-weight: 800;
  color: var(--text-main);
  text-align: center; margin-bottom: 6px;
  letter-spacing: -.01em;
}
.modal-sub {
  text-align: center; color: var(--text-muted);
  font-size: .85rem; margin-bottom: 30px;
  line-height: 1.5;
}

.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-family: 'Space Grotesk', sans-serif;
  font-size: .72rem; font-weight: 700;
  color: var(--text-muted); margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: .1em;
}
.field input {
  width: 100%;
  padding: 13px 16px;
  border: 1px solid var(--card-border);
  border-radius: 12px;
  font-family: 'Outfit', sans-serif;
  font-size: .96rem; color: var(--text-main);
  background: rgba(0,0,0,.35);
  outline: none; transition: all .3s ease;
}
.field input::placeholder { color: rgba(255,255,255,.2); }
.field input:focus {
  border-color: var(--accent-primary);
  background: rgba(0,0,0,.5);
  box-shadow: 0 0 0 3px rgba(139,92,246,.22);
}

.modal-btns { display: flex; gap: 10px; margin-top: 12px; }

.btn-cancel {
  flex: 1; padding: 13px;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: .88rem; font-weight: 600;
  color: var(--text-muted); cursor: pointer;
  transition: all .25s; letter-spacing: .03em;
}
.btn-cancel:hover { background: rgba(255,255,255,.1); color: var(--text-main); border-color: rgba(255,255,255,.18); }

.btn-confirm {
  flex: 2; padding: 13px;
  background: linear-gradient(135deg, var(--accent-primary), #6D28D9);
  border: none; border-radius: 12px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: .9rem; font-weight: 700;
  color: #fff; cursor: pointer;
  transition: all .25s ease;
  box-shadow: 0 4px 18px rgba(139,92,246,.4);
  letter-spacing: .04em;
  position: relative; overflow: hidden;
}
.btn-confirm::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 55%);
  pointer-events: none;
}
.btn-confirm:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(139,92,246,.55); }
.btn-confirm:disabled { opacity: .5; cursor: not-allowed; }

.modal-msg {
  margin-top: 14px; padding: 12px 14px;
  border-radius: 12px; font-size: .85rem;
  text-align: center; display: none;
  font-weight: 500; line-height: 1.5;
}
.modal-msg.error   { background: rgba(239,68,68,.1);  color: var(--danger);  border: 1px solid rgba(239,68,68,.25); }
.modal-msg.success { background: rgba(16,185,129,.1); color: var(--success); border: 1px solid rgba(16,185,129,.25); }

/* ── Error state ── */
.error-state { text-align: center; padding: 100px 20px; color: var(--text-muted); }
.error-state .icon { font-size: 3.5rem; margin-bottom: 18px; }
.error-state h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.4rem; color: var(--text-main); margin-bottom: 8px;
}
.error-state a {
  display: inline-block; margin-top: 18px;
  background: linear-gradient(135deg, var(--accent-primary), #6D28D9);
  color: #fff; border-radius: 100px;
  padding: 11px 28px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: .84rem; font-weight: 700;
  text-decoration: none; letter-spacing: .04em;
  box-shadow: 0 4px 20px rgba(139,92,246,.4);
  transition: all .25s;
}
.error-state a:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(139,92,246,.55); }
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>

<!-- ── Loader ── -->
<div id="page-loader">
  <div class="spinner"></div>
  <p>Loading tournament…</p>
</div>

<!-- ── Main content ── -->
<div id="page-content">

  <!-- Cover -->
  <div class="cover">
    <img id="cover-img" src="" alt="Tournament cover">
    <div class="cover-overlay"></div>
    <div class="cover-grid"></div>
    <div class="cover-vignette"></div>
    <a href="home.html" class="back-btn">← Back</a>
    <div id="cover-badge" class="cover-badge"></div>
    <div class="cover-info">
      <h1 id="cover-name"></h1>
    </div>
  </div>

  <!-- Body -->
  <div class="content">

    <!-- Info pills -->
    <div class="pills-row">
      <div class="pill pill-price" id="pill-price"></div>
      <div class="pill pill-spots" id="pill-spots"></div>
    </div>

    <!-- Player slots -->
    <div class="block">
      <div class="block-title">🪑 Tournament Slots</div>
      <div class="dots-wrap" id="dots"></div>
      <p class="dots-sub" id="dots-sub"></p>
    </div>

    <!-- Description -->
    <div class="block">
      <div class="block-title">📖 About the Game</div>
      <p class="desc-ar" id="description"></p>
      <p class="explain-ar" id="explaining"></p>
    </div>

  </div>
</div>

<!-- ── Sticky bar ── -->
<div class="sticky-bar" id="sticky-bar" style="display:none;">
  <div>
    <div class="bar-price-label">Tournament Fee</div>
    <div class="bar-price-amount" id="bar-price"></div>
  </div>
  <button class="btn-book" id="book-btn" onclick="openModal()">🎯 Book My Spot</button>
</div>

<!-- ── Booking modal ── -->
<div class="modal-bg" id="modal-bg">
  <div class="modal-card">
    <div class="modal-icon">🎲</div>
    <div class="modal-title">Book Your Spot!</div>
    <div class="modal-sub">Enter your details to confirm your booking</div>

    <div class="field">
      <label>Your Name</label>
      <input type="text" id="b-name" placeholder="Ahmed Mohamed">
    </div>
    <div class="field">
      <label>Phone Number</label>
      <input type="tel" id="b-phone" placeholder="01xxxxxxxxx">
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="btn-confirm" onclick="confirmBooking()">Confirm 🎯</button>
    </div>
    <div class="modal-msg" id="modal-msg"></div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

const params       = new URLSearchParams(window.location.search);
const tournamentId = params.get('id');
let currentUser    = null;
let currentData    = null;

auth.onAuthStateChanged(user => {
  if (!user || !user.emailVerified) { window.location.href = 'index.html'; return; }
  currentUser = user;
  if (!tournamentId) { window.location.href = 'home.html'; return; }
  loadTournament();
});

function loadTournament() {
  db.collection('tournaments').doc(tournamentId).onSnapshot(doc => {
    if (!doc.exists) { window.location.href = 'home.html'; return; }
    const t   = doc.data();
    currentData = t;

    document.getElementById('page-loader').style.display  = 'none';
    document.getElementById('page-content').style.display = 'block';
    document.getElementById('sticky-bar').style.display   = 'flex';
    document.title = `BoardZone 🎲 — ${t.name}`;

    document.getElementById('cover-img').src          = t.image;
    document.getElementById('cover-name').textContent  = t.name + ' 🎮';
    document.getElementById('cover-badge').textContent = `${t.price} ${t.currency}`;

    document.getElementById('pill-price').innerHTML = `💰 ${escapeHtml(String(t.price))} ${escapeHtml(t.currency)}`;
    const sp = document.getElementById('pill-spots');
    sp.className = 'pill pill-spots';
    if (t.playersLeft === 0) {
      sp.textContent = '🔒 Tournament Full';
      sp.classList.add('full');
    } else if (t.playersLeft <= 2) {
      sp.textContent = `⚡ Only ${t.playersLeft} spot${t.playersLeft > 1 ? 's' : ''} left!`;
      sp.classList.add('low');
    } else {
      sp.textContent = `👥 ${t.playersLeft} spots available`;
    }

    const dotsEl = document.getElementById('dots');
    dotsEl.innerHTML = '';
    const filled = t.totalPlayers - t.playersLeft;
    for (let i = 0; i < t.totalPlayers; i++) {
      const d = document.createElement('div');
      if (i < filled) {
        d.className = 'dot filled';
        d.textContent = '👤';
        d.style.animationDelay = `${i * 0.09}s`;
      } else {
        d.className = 'dot empty';
        d.textContent = '○';
      }
      dotsEl.appendChild(d);
    }
    document.getElementById('dots-sub').textContent =
      t.playersLeft === 0
        ? 'This tournament is full. No more spots available.'
        : `${filled} player${filled !== 1 ? 's' : ''} joined · ${t.playersLeft} spot${t.playersLeft !== 1 ? 's' : ''} remaining!`;

    document.getElementById('description').textContent = t.description;
    document.getElementById('explaining').textContent  = t.explaining;
    document.getElementById('bar-price').textContent   = `${t.price} ${t.currency}`;

    updateBookBtn(t.playersLeft);
  }, err => {
    console.error('Firestore error:', err);
    document.getElementById('page-loader').style.display  = 'none';
    document.getElementById('page-content').style.display = 'block';
    document.getElementById('page-content').innerHTML =
      '<div class="error-state"><div class="icon">⚠️</div><h3>Failed to Load Tournament</h3><p>Something went wrong. Please try again.</p><a href="home.html">← Back to Home</a></div>';
  });
}

async function updateBookBtn(playersLeft) {
  const btn = document.getElementById('book-btn');
  if (playersLeft === 0) { btn.disabled = true; btn.textContent = '🔒 Tournament Full'; return; }
  const bookId   = `${currentUser.uid}_${tournamentId}`;
  const existing = await db.collection('bookings').doc(bookId).get();
  if (existing.exists) {
    btn.disabled = true; btn.className = 'btn-book booked'; btn.textContent = '✅ Already Booked!';
  } else {
    btn.disabled = false; btn.className = 'btn-book'; btn.textContent = '🎯 Book My Spot';
  }
}

function openModal() {
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('modal-msg').style.display = 'none';
  document.getElementById('b-name').value  = '';
  document.getElementById('b-phone').value = '';
  document.getElementById('btn-confirm').disabled    = false;
  document.getElementById('btn-confirm').textContent = 'Confirm 🎯';
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

function modalMsg(text, type) {
  const el = document.getElementById('modal-msg');
  el.textContent = text; el.className = 'modal-msg ' + type; el.style.display = 'block';
}

async function confirmBooking() {
  const name  = document.getElementById('b-name').value.trim();
  const phone = document.getElementById('b-phone').value.trim();
  if (!name)  return modalMsg('Please enter your name.', 'error');
  if (!phone) return modalMsg('Please enter your phone number.', 'error');
  if (!/^[0-9+\-\s]{8,15}$/.test(phone)) return modalMsg('Please enter a valid phone number.', 'error');

  const confirmBtn = document.getElementById('btn-confirm');
  confirmBtn.disabled = true; confirmBtn.textContent = 'Booking…';

  try {
    const tRef    = db.collection('tournaments').doc(tournamentId);
    const bookId  = `${currentUser.uid}_${tournamentId}`;
    const bookRef = db.collection('bookings').doc(bookId);

    const dup = await bookRef.get();
    if (dup.exists) {
      closeModal();
      const btn = document.getElementById('book-btn');
      btn.disabled = true; btn.className = 'btn-book booked'; btn.textContent = '✅ Already Booked!';
      return;
    }

    await db.runTransaction(async tx => {
      const tDoc = await tx.get(tRef);
      if (!tDoc.exists) throw new Error('Tournament not found.');
      const data = tDoc.data();
      if (data.playersLeft <= 0) throw new Error('Sorry — this tournament is now full!');
      tx.update(tRef, { playersLeft: firebase.firestore.FieldValue.increment(-1) });
      tx.set(bookRef, {
        tournamentId,
        tournamentName: currentData.name,
        userId:         currentUser.uid,
        userEmail:      currentUser.email,
        userName:       name,
        userPhone:      phone,
        bookedAt:       firebase.firestore.FieldValue.serverTimestamp()
      });
    });

    modalMsg('🎉 Booking confirmed! See you at the tournament!', 'success');
    const btn = document.getElementById('book-btn');
    btn.disabled = true; btn.className = 'btn-book booked'; btn.textContent = '✅ Booked!';
    setTimeout(() => closeModal(), 2600);

  } catch(e) {
    modalMsg(e.message, 'error');
    confirmBtn.disabled = false; confirmBtn.textContent = 'Confirm 🎯';
  }
}
</script>
</body>
</html>
